services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ammps_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Salimata
      POSTGRES_DB: regbot
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d regbot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
    name: ammps_pgdata
